<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Secret Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; background: #0b0813; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; position: relative; }
        
        /* The Growing Flowers Canvas Background */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Content Card Container staying on top */
        .container-box { position: relative; z-index: 5; background: rgba(11, 9, 20, 0.88); backdrop-filter: blur(8px); border: 1px solid rgba(255, 117, 140, 0.2); padding: 35px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 117, 140, 0.2); text-align: center; max-width: 450px; width: 90%; transition: all 0.5s ease; }

        /* Lock Screen Layout */
        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h2 { font-size: 1.6rem; margin-bottom: 20px; color: #ff758c; text-shadow: 0 0 15px rgba(255,117,140,0.6); font-family: monospace; letter-spacing: 2px; }
        input { padding: 14px; font-size: 1.3rem; border: 2px solid #ff758c; border-radius: 30px; text-align: center; margin-bottom: 20px; width: 260px; background: rgba(0,0,0,0.6); color: #ff9ebb; outline: none; font-family: monospace; }
        button { padding: 14px 35px; font-size: 1.1rem; background: linear-gradient(45deg, #ff758c, #ff7eb3); border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(255,117,140,0.4); transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        #error-msg { color: #ff4757; margin-top: 15px; font-weight: bold; font-family: monospace; }

        /* Interactive Envelope Step */
        #envelope-container { display: none; }
        .envelope { width: 260px; height: 160px; background: #ff758c; position: relative; border-radius: 0 0 10px 10px; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin: 20px auto; transition: 0.5s; }
        .envelope::before { content: ''; position: absolute; top: 0; left: 0; border-left: 130px solid transparent; border-right: 130px solid transparent; border-top: 90px solid #ff9ebb; transform-origin: top; transition: transform 0.5s; z-index: 3; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .envelope-text { position: absolute; width: 100%; bottom: 20px; text-align: center; font-weight: bold; color: white; font-size: 1.1rem; letter-spacing: 1px; }

        /* Dynamic Typewriter Letter Box */
        #letter-box { display: none; background: #ffffff; color: #1a1a24; text-align: left; }
        #letter-text { font-size: 1.1rem; line-height: 1.8; font-style: italic; min-height: 150px; font-weight: 500; }
        .next-btn { display: none; margin: 25px auto 0 auto; background: #ff758c; color: white; }

        /* Final Display Wishes Screen Layout */
        #gallery-screen { display: none; }
        .gallery-title { font-size: 2.1rem; color: #ff758c; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255,117,140,0.6); }
        p { font-size: 1.1rem; color: #f0e6ef; line-height: 1.6; }
    </style>
</head>
<body>

    <!-- GROWING FLOWER CANVAS ENGINE -->
    <canvas id="flowerCanvas"></canvas>

    <!-- CONTENT BOX HOUSING CARD STATES -->
    <div class="container-box" id="mainCard">
        
        <!-- 1. PASSCODE SCREEN -->
        <div id="lock-screen">
            <h2>🔒 ENTER ACCESS CODE</h2>
            <input type="text" id="password" pattern="[0-9]*" inputmode="numeric" placeholder="DDMMYYYY">
            <button id="unlockBtn">Unlock</button>
            <div id="error-msg"></div>
        </div>

        <!-- 2. INTERACTIVE ENVELOPE CONTAINER -->
        <div id="envelope-container">
            <h2 style="margin-bottom: 10px;">Message Received! 💌</h2>
            <p style="color: #bfaec2; margin-bottom: 20px; font-size: 0.95rem;">Tap envelope to view</p>
            <div class="envelope" id="mainEnvelope">
                <div class="envelope-text">FOR MEGHAPPI ❤️</div>
            </div>
        </div>

        <!-- 3. TYPEWRITER LETTER BOX -->
        <div id="letter-box">
            <div id="letter-text"></div>
            <button class="next-btn" id="toGalleryBtn">Grow Your Gift ➔</button>
        </div>

        <!-- 4. FINAL CELEBRATION WISHES -->
        <div id="gallery-screen">
            <h1 class="gallery-title">Happy Birthday, MEGHAPPI! 🎉💐</h1>
            <p>Some people give physical flowers that fade away... but these digital ones will bloom on the internet for you forever. Have the most wonderful birthday! ❤️✨</p>
        </div>

    </div>

    <script>
        // --- PROCCEDURAL GROWING FLOWERS GENERATOR ---
        const canvas = document.getElementById('flowerCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let animationFrameId;
        let flowerGrowthProgress = 0;
        let isFlowerTriggered = false;
        let fireflies = [];

        // Setup starry night/spark coordinates
        for(let i=0; i<30; i++) {
            fireflies.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: Math.random() * 2 + 1,
                speedY: Math.random() * 0.5 + 0.2,
                alpha: Math.random()
            });
        }

        function drawFlowerSystem() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw glowing background firefly particles
            fireflies.forEach(p => {
                p.y -= p.speedY;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 220, 150, ${Math.sin(Date.now()/500 + p.alpha)})`;
                ctx.fill();
            });

            if (!isFlowerTriggered) {
                animationFrameId = requestAnimationFrame(drawFlowerSystem);
                return;
            }

            if (flowerGrowthProgress < 1) flowerGrowthProgress += 0.006; // Growth speed

            const startX = canvas.width / 2;
            const startY = canvas.height;
            const maxHeight = canvas.height * 0.55;

            // Definition metrics for 3 distinct glowing stems
            const stems = [
                { targetX: startX - 60, targetY: canvas.height - maxHeight * 0.8, controlX: startX - 30, color: "#2d6a4f" },
                { targetX: startX, targetY: canvas.height - maxHeight, controlX: startX, color: "#1b4332" },
                { targetX: startX + 60, targetY: canvas.height - maxHeight * 0.85, controlX: startX + 30, color: "#2d6a4f" }
            ];

            stems.forEach((stem) => {
                // Calculate current coordinates dynamically based on growth stage factor
                const currentY = startY - (startY - stem.targetY) * flowerGrowthProgress;
                const currentX = startX + (stem.targetX - startX) * flowerGrowthProgress;

                // Draw Stems
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(stem.controlX, (startY + currentY)/2, currentX, currentY);
                ctx.strokeStyle = stem.color;
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Draw decorative leaves along the paths
                if (flowerGrowthProgress > 0.4) {
                    ctx.fillStyle = "#40916c";
                    ctx.beginPath();
                    ctx.ellipse(startX + (currentX - startX)*0.5 - 15, startY - (startY - currentY)*0.5, 12, 6, -Math.PI/4, 0, Math.PI*2);
                    ctx.ellipse(startX + (currentX - startX)*0.6 + 15, startY - (startY - currentY)*0.6, 12, 6, Math.PI/4, 0, Math.PI*2);
                    ctx.fill();
                }

                // Bloom flower blossom petals when growth reaches near termination threshold
                if (flowerGrowthProgress >= 0.95) {
                    drawBlossom(currentX, currentY);
                }
            });

            animationFrameId = requestAnimationFrame(drawFlowerSystem);
        }

        function drawBlossom(cx, cy) {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff758c";

            // Draw glowing outer background aura glow halo ring
            ctx.beginPath();
            ctx.arc(cx, cy, 25, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 117, 140, 0.15)";
            ctx.fill();

            // Draw individual overlapping round petals sequentially
            const totalPetals = 5;
            ctx.fillStyle = "#ff758c";
            for (let i = 0; i < totalPetals; i++) {
                ctx.beginPath();
                const angle = (i * 2 * Math.PI) / totalPetals;
                const petalX = cx + Math.cos(angle) * 14;
                const petalY = cy + Math.sin(angle) * 14;
                ctx.arc(petalX, petalY, 12, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw internal lighter core petal accents
            ctx.fillStyle = "#ff9ebb";
            for (let i = 0; i < totalPetals; i++) {
                ctx.beginPath();
                const angle = (i * 2 * Math.PI) / totalPetals;
                const petalX = cx + Math.cos(angle) * 8;
                const petalY = cy + Math.sin(angle) * 8;
                ctx.arc(petalX, petalY, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            // Bright glowing yellow stamen center core point
            ctx.beginPath();
            ctx.arc(cx, cy, 7, 0, Math.PI * 2);
            ctx.fillStyle = "#ffeaa7";
            ctx.fill();

            ctx.restore();
        }

        // Run baseline firefly canvas processing looping instantly
        requestAnimationFrame(drawFlowerSystem);


        // --- INTERACTIVE ENGINE DEPLOYMENT SEQUENCERS ---
        const messageText = "Dearest Meghappi... \n\nHappy Birthday to the most amazing girl in the entire universe. 🎂✨ \n\nYou make every single day brighter just by being in it. Your laughter is my favorite sound, and your happiness means everything to me. Here's to celebrating you today, your beautiful heart, and making countless more gorgeous memories together. \n\nI love you! ❤️";
        
        let index = 0;
        function typeWriter() {
            if (index < messageText.length) {
                let char = messageText.charAt(index);
                document.getElementById("letter-text").innerHTML += char === "\n" ? "<br>" : char;
                index++;
                setTimeout(typeWriter, 45); 
            } else {
                document.getElementById("toGalleryBtn").style.display = "block";
            }
        }

        // 1. Password Verification
        document.getElementById("unlockBtn").onclick = function() {
            var val = document.getElementById("password").value.trim();
            if (val === "18012007") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("envelope-container").style.display = "block";
            } else {
                document.getElementById("error-msg").innerText = "❌ Code incorrect! Try again, love!";
            }
        };

        // 2. Open Letter Click Sequence
        document.getElementById("mainEnvelope").onclick = function() {
            this.classList.add("open");
            setTimeout(() => {
                document.getElementById("envelope-container").style.display = "none";
                document.getElementById("letter-box").style.display = "block";
                typeWriter();
            }, 800);
        };

        // 3. Complete Final Transition & Trigger Growing Flower Function
        document.getElementById("toGalleryBtn").onclick = function() {
            document.getElementById("letter-box").style.display = "none";
            document.getElementById("gallery-screen").style.display = "block";
            
            // Reposition and semi-transparent the layout text box so she can watch the beautiful flowers grow
            document.getElementById("mainCard").style.background = "rgba(11, 9, 20, 0.4)";
            document.getElementById("mainCard").style.position = "absolute";
            document.getElementById("mainCard").style.top = "40px";
            
            isFlowerTriggered = true; // Launches the growth drawing loop
        };
    </script>
</body>
</html>
