<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Secret Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; background: #0b0914; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; overflow: hidden; position: relative; }
        
        /* --- CSS GROWING & BLOWING GARDEN LAYOUT --- */
        .garden { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; pointer-events: none; }

        /* The Flower Structure */
        .flower { position: absolute; bottom: 0; transform-origin: bottom center; animation: sway 4s ease-in-out infinite alternate; }
        
        /* Stems growing animation */
        .stem { width: 6px; background: linear-gradient(to top, #134e4a, #10b981); margin: 0 auto; border-radius: 4px; animation: growStem 3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        /* Petals expanding animation */
        .blooming-head { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%) scale(0); border-radius: 50%; animation: bloom 2s 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; display: flex; justify-content: center; align-items: center; }

        /* Flower Variety 1: Deep Red Rose style */
        .flower-rose .stem { height: 280px; }
        .flower-rose .blooming-head { width: 75px; height: 75px; background: radial-gradient(circle, #ff1744, #b71c1c); box-shadow: 0 0 25px rgba(255, 23, 68, 0.6); }
        .flower-rose .blooming-head::after { content: '🌹'; font-size: 2.2rem; }

        /* Flower Variety 2: Pink Cherry Blossom style */
        .flower-pink .stem { height: 220px; width: 5px; background: linear-gradient(to top, #14532d, #22c55e); }
        .flower-pink .blooming-head { width: 65px; height: 65px; background: radial-gradient(circle, #ff758c, #ff7eb3); box-shadow: 0 0 20px rgba(255, 117, 140, 0.7); }
        .flower-pink .blooming-head::after { content: '🌸'; font-size: 1.9rem; }

        /* Flower Variety 3: White Jasmine style */
        .flower-jasmine .stem { height: 180px; width: 4px; }
        .flower-jasmine .blooming-head { width: 55px; height: 55px; background: radial-gradient(circle, #ffffff, #f0e6ef); box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        .flower-jasmine .blooming-head::after { content: '💮'; font-size: 1.6rem; }

        /* Flower Leaves */
        .leaf { position: absolute; width: 25px; height: 15px; background: #10b981; border-radius: 15px 0; transform: scale(0); transform-origin: left center; }
        .leaf-left { left: -22px; transform: rotate(-35deg); animation: leafGrow 1.5s 1.5s forwards; }
        .leaf-right { right: -22px; transform: scaleX(-1) rotate(-35deg); animation: leafGrow 1.5s 1.8s forwards; }

        /* --- SURPRISE CONTENT INTERFACE CARD --- */
        .container-box { position: relative; z-index: 5; background: rgba(11, 9, 20, 0.92); backdrop-filter: blur(10px); border: 1px solid rgba(255, 117, 140, 0.2); padding: 35px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 117, 140, 0.2); text-align: center; max-width: 450px; width: 90%; transition: all 0.6s ease; }

        /* Passcode Lock elements */
        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h2 { font-size: 1.6rem; margin-bottom: 20px; color: #ff758c; text-shadow: 0 0 15px rgba(255,117,140,0.6); font-family: monospace; letter-spacing: 2px; }
        input { padding: 14px; font-size: 1.3rem; border: 2px solid #ff758c; border-radius: 30px; text-align: center; margin-bottom: 20px; width: 260px; background: rgba(0,0,0,0.6); color: #ff9ebb; outline: none; box-shadow: 0 0 10px rgba(255,117,140,0.2); font-family: monospace; }
        button { padding: 14px 35px; font-size: 1.1rem; background: linear-gradient(45deg, #ff758c, #ff7eb3); border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(255,117,140,0.4); transition: 0.3s; }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(255,117,140,0.7); }
        #error-msg { color: #ff4757; margin-top: 15px; font-weight: bold; font-family: monospace; }

        /* Envelope */
        #envelope-container { display: none; }
        .envelope { width: 260px; height: 160px; background: #ff758c; position: relative; border-radius: 0 0 10px 10px; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin: 20px auto; transition: 0.5s; }
        .envelope::before { content: ''; position: absolute; top: 0; left: 0; border-left: 130px solid transparent; border-right: 130px solid transparent; border-top: 90px solid #ff9ebb; transform-origin: top; transition: transform 0.5s; z-index: 3; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .envelope-text { position: absolute; width: 100%; bottom: 20px; text-align: center; font-weight: bold; color: white; font-size: 1.1rem; letter-spacing: 1px; }

        /* Letter setup */
        #letter-box { display: none; background: #ffffff; color: #1a1a24; text-align: left; }
        #letter-text { font-size: 1.1rem; line-height: 1.8; font-style: italic; min-height: 150px; font-weight: 500; }
        .next-btn { display: none; margin: 25px auto 0 auto; background: #ff758c; color: white; }

        /* Final Display Wishes Screen */
        #gallery-screen { display: none; }
        .gallery-title { font-size: 2rem; color: #ff758c; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255,117,140,0.6); }
        p { font-size: 1.05rem; color: #f0e6ef; line-height: 1.6; }

        /* --- ANIMATION KEYFRAMES --- */
        @keyframes growStem { from { height: 0; } }
        @keyframes bloom { to { transform: translate(-50%, -50%) scale(1); } }
        @keyframes leafGrow { to { transform: rotate(-35deg) scale(1); } }
        @keyframes sway {
            0% { transform: rotate(-4deg); }
            100% { transform: rotate(4deg); }
        }
    </style>
</head>
<body>

    <!-- DIGITAL BLOWING FLOWER GARDEN BACKGROUND -->
    <div class="garden" id="flowerGarden">
        <!-- Left Side Flower Group -->
        <div class="flower flower-rose" style="left: 8%; animation-delay: 0.2s;">
            <div class="stem"><div class="leaf leaf-left" style="top: 100px;"></div><div class="leaf leaf-right" style="top: 160px;"></div></div>
            <div class="blooming-head"></div>
        </div>
        <div class="flower flower-jasmine" style="left: 18%; animation-delay: 0.7s;">
            <div class="stem"><div class="leaf leaf-left" style="top: 60px;"></div></div>
            <div class="blooming-head"></div>
        </div>

        <!-- Middle Background Rows -->
        <div class="flower flower-pink" style="left: 32%; animation-delay: 0.4s; opacity: 0.9;">
            <div class="stem"><div class="leaf leaf-right" style="top: 90px;"></div></div>
            <div class="blooming-head"></div>
        </div>
        <div class="flower flower-rose" style="left: 48%; animation-delay: 0.1s;">
            <div class="stem"><div class="leaf leaf-left" style="top: 120px;"></div><div class="leaf leaf-right" style="top: 70px;"></div></div>
            <div class="blooming-head"></div>
        </div>
        <div class="flower flower-jasmine" style="left: 62%; animation-delay: 0.9s;">
            <div class="stem"><div class="leaf leaf-right" style="top: 80px;"></div></div>
            <div class="blooming-head"></div>
        </div>

        <!-- Right Side Flower Group -->
        <div class="flower flower-pink" style="left: 76%; animation-delay: 0.5s;">
            <div class="stem"><div class="leaf leaf-left" style="top: 110px;"></div></div>
            <div class="blooming-head"></div>
        </div>
        <div class="flower flower-rose" style="left: 88%; animation-delay: 0.3s;">
            <div class="stem"><div class="leaf leaf-left" style="top: 140px;"></div><div class="leaf leaf-right" style="top: 80px;"></div></div>
            <div class="blooming-head"></div>
        </div>
    </div>

    <!-- MAIN INTERACTIVE INTERFACE CARD -->
    <div class="container-box" id="mainCard">
        
        <!-- 1. PASSCODE LOCK SCREEN -->
        <div id="lock-screen">
            <h2>🔒 ENTER ACCESS CODE</h2>
            <input type="text" id="password" pattern="[0-9]*" inputmode="numeric" placeholder="DDMMYYYY">
            <button id="unlockBtn">Unlock Garden</button>
            <div id="error-msg"></div>
        </div>

        <!-- 2. INTERACTIVE ENVELOPE -->
        <div id="envelope-container">
            <h2 style="margin-bottom: 10px;">Message Received! 💌</h2>
            <p style="color: #bfaec2; margin-bottom: 20px; font-size: 0.95rem;">Tap envelope to open</p>
            <div class="envelope" id="mainEnvelope">
                <div class="envelope-text">FOR MEGHAPPI ❤️</div>
            </div>
        </div>

        <!-- 3. TYPEWRITER LETTER -->
        <div id="letter-box">
            <div id="letter-text"></div>
            <button class="next-btn" id="toGalleryBtn">Click for Final Surprise ➔</button>
        </div>

        <!-- 4. FINAL SURPRISE SCREEN -->
        <div id="gallery-screen">
            <h1 class="gallery-title">Happy Birthday, MEGHAPPI! 🎉💖</h1>
            <p>A digital garden grown entirely out of code for you. May your days always bloom with happiness and bright colors. Have the most beautiful birthday love! ❤️🎂</p>
        </div>

    </div>

    <script>
        // --- INTERACTIVE SYSTEM CARD LOGIC ---
        const messageText = "Dearest Meghappi... \n\nHappy Birthday to the most amazing girl in the entire universe. 🎂✨ \n\nYou make every single day brighter just by being in it. Your laughter is my favorite sound, and your happiness means everything to me. Here's to celebrating you today, your beautiful heart, and making countless more gorgeous memories together. \n\nI love you! ❤️";
        
        let index = 0;
        function typeWriter() {
            if (index < messageText.length) {
                let char = messageText.charAt(index);
                document.getElementById("letter-text").innerHTML += char === "\n" ? "<br>" : char;
                index++;
                setTimeout(typeWriter, 45); 
            } else {
                document.getElementById("toGalleryBtn").style.display = "block";
            }
        }

        // 1. Password Verification
        document.getElementById("unlockBtn").onclick = function() {
            var val = document.getElementById("password").value.trim();
            if (val === "18012007") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("envelope-container").style.display = "block";
                
                // Immediately activate the CSS blowing flower garden!
                document.getElementById("flowerGarden").style.display = "block";
            } else {
                document.getElementById("error-msg").innerText = "❌ Try again, love!";
            }
        };

        // 2. Envelope Triggers Letter Sequence
        document.getElementById("mainEnvelope").onclick = function() {
            this.classList.add("open");
            setTimeout(() => {
                document.getElementById("envelope-container").style.display = "none";
                document.getElementById("letter-box").style.display = "block";
                typeWriter();
            }, 800);
        };

        // 3. Move to final display screen
        document.getElementById("toGalleryBtn").onclick = function() {
            document.getElementById("letter-box").style.display = "none";
            document.getElementById("gallery-screen").style.display = "block";
            
            // Pushes the card up slightly and opens up transparency so she can see the full blowing garden
            document.getElementById("mainCard").style.background = "rgba(11, 9, 20, 0.4)";
            document.getElementById("mainCard").style.position = "absolute";
            document.getElementById("mainCard").style.top = "40px";
        };
    </script>
</body>
</html>
