<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Secret Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; background: #05020a; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; overflow: hidden; position: relative; }
        
        /* The 3D Heart Canvas Background - Forcing it visible */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* Content Box Container staying underneath or blending nicely */
        .container-box { position: relative; z-index: 5; background: rgba(11, 9, 20, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 117, 140, 0.2); padding: 35px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 117, 140, 0.2); text-align: center; max-width: 450px; width: 90%; transition: all 0.5s ease; }

        /* Lock Screen */
        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h2 { font-size: 1.6rem; margin-bottom: 20px; color: #ff758c; text-shadow: 0 0 15px rgba(255,117,140,0.6); font-family: monospace; letter-spacing: 2px; }
        input { padding: 14px; font-size: 1.3rem; border: 2px solid #ff758c; border-radius: 30px; text-align: center; margin-bottom: 20px; width: 260px; background: rgba(0,0,0,0.6); color: #ff9ebb; outline: none; box-shadow: 0 0 10px rgba(255,117,140,0.2); font-family: monospace; }
        button { padding: 14px 35px; font-size: 1.1rem; background: linear-gradient(45deg, #ff758c, #ff7eb3); border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(255,117,140,0.4); transition: 0.3s; }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(255,117,140,0.7); }
        #error-msg { color: #ff4757; margin-top: 15px; font-weight: bold; font-family: monospace; }

        /* Interactive Envelope Step */
        #envelope-container { display: none; }
        .envelope { width: 260px; height: 160px; background: #ff758c; position: relative; border-radius: 0 0 10px 10px; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin: 20px auto; transition: 0.5s; }
        .envelope::before { content: ''; position: absolute; top: 0; left: 0; border-left: 130px solid transparent; border-right: 130px solid transparent; border-top: 90px solid #ff9ebb; transform-origin: top; transition: transform 0.5s; z-index: 3; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .envelope-text { position: absolute; width: 100%; bottom: 20px; text-align: center; font-weight: bold; color: white; font-size: 1.1rem; letter-spacing: 1px; }

        /* Dynamic Typewriter Letter Box */
        #letter-box { display: none; background: #ffffff; color: #1a1a24; text-align: left; }
        #letter-text { font-size: 1.1rem; line-height: 1.8; font-style: italic; min-height: 150px; font-weight: 500; }
        .next-btn { display: none; margin: 25px auto 0 auto; background: #ff758c; color: white; }

        /* Final Display Wishes Screen - Shifted to make room for heart */
        #gallery-screen { display: none; }
        .gallery-title { font-size: 2rem; color: #ff758c; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255,117,140,0.6); }
        p { font-size: 1.05rem; color: #f0e6ef; line-height: 1.6; }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="container-box" id="mainCard">
        
        <div id="lock-screen">
            <h2>🔒 ENTER ACCESS CODE</h2>
            <input type="text" id="password" pattern="[0-9]*" inputmode="numeric" placeholder="DDMMYYYY">
            <button id="unlockBtn">Unlock</button>
            <div id="error-msg"></div>
        </div>

        <div id="envelope-container">
            <h2 style="margin-bottom: 10px;">Message Received! 💌</h2>
            <p style="color: #bfaec2; margin-bottom: 20px; font-size: 0.95rem;">Tap envelope to open</p>
            <div class="envelope" id="mainEnvelope">
                <div class="envelope-text">FOR MEGHAPPI ❤️</div>
            </div>
        </div>

        <div id="letter-box">
            <div id="letter-text"></div>
            <button class="next-btn" id="toGalleryBtn">Click for Final Surprise ➔</button>
        </div>

        <div id="gallery-screen">
            <h1 class="gallery-title">Happy Birthday, MEGHAPPI! 🎉💖</h1>
            <p>Look behind this message! A mathematical shape made entirely from love text just for you. Have the most magical day! ❤️🎂</p>
        </div>

    </div>

    <script>
        // --- 3D SPINNING TEXT HEART ENGINE ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const textPhrase = " I Love U Meghappi";
        let phraseIndex = 0;
        let rotationAngle = 0;
        let isHeartRevealed = false;

        function drawSpinningHeart() {
            // Clears canvas beautifully while leaving subtle text trace lines
            ctx.fillStyle = "rgba(5, 2, 10, 0.25)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            
            // Adjust heart vertical placement dynamically depending on reveal phase
            const centerY = isHeartRevealed ? (canvas.height / 2) : (canvas.height / 2);
            
            // Scaling engine optimized strictly for phone widths versus computer screens
            const baseScale = Math.min(canvas.width, canvas.height) / (isHeartRevealed ? 24 : 32);

            ctx.font = "bold 11px monospace";
            phraseIndex = 0;

            for (let angle = 0; angle < Math.PI * 2; angle += 0.04) {
                
                const xCoordinate = 16 * Math.pow(Math.sin(angle), 3);
                const yCoordinate = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));

                // 3D Matrix spinning rotation variables
                const rotatedX = xCoordinate * Math.cos(rotationAngle) - yCoordinate * Math.sin(rotationAngle) * 0.2;
                const rotatedY = yCoordinate * Math.cos(rotationAngle) * 0.8 + xCoordinate * Math.sin(rotationAngle) * 0.2;

                const screenX = centerX + rotatedX * baseScale;
                const screenY = centerY + rotatedY * baseScale;

                const charToPrint = textPhrase[phraseIndex % textPhrase.length];
                phraseIndex++;

                // Beautiful glowing pink styling
                ctx.fillStyle = `hsl(${340 + Math.sin(rotationAngle + angle) * 15}, 100%, 72%)`;
                ctx.fillText(charToPrint, screenX, screenY);
            }

            rotationAngle += 0.02; // Speed multiplier
            requestAnimationFrame(drawSpinningHeart);
        }
        
        requestAnimationFrame(drawSpinningHeart);

        // --- INTERACTIVE SYSTEM CARD LOGIC ---
        const messageText = "Dearest Meghappi... \n\nHappy Birthday to the most amazing girl in the entire universe. 🎂✨ \n\nYou make every single day brighter just by being in it. Your laughter is my favorite sound, and your happiness means everything to me. Here's to celebrating you today, your beautiful heart, and making countless more gorgeous memories together. \n\nI love you! ❤️";
        
        let index = 0;
        function typeWriter() {
            if (index < messageText.length) {
                let char = messageText.charAt(index);
                document.getElementById("letter-text").innerHTML += char === "\n" ? "<br>" : char;
                index++;
                setTimeout(typeWriter, 45); 
            } else {
                document.getElementById("toGalleryBtn").style.display = "block";
            }
        }

        // 1. Passcode Input Check
        document.getElementById("unlockBtn").onclick = function() {
            var val = document.getElementById("password").value.trim();
            if (val === "18012007") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("envelope-container").style.display = "block";
            } else {
                document.getElementById("error-msg").innerText = "❌ Try again, love!";
            }
        };

        // 2. Envelope Triggers Letter Sequence
        document.getElementById("mainEnvelope").onclick = function() {
            this.classList.add("open");
            setTimeout(() => {
                document.getElementById("envelope-container").style.display = "none";
                document.getElementById("letter-box").style.display = "block";
                typeWriter();
            }, 800);
        };

        // 3. Move to target final screen & rearrange elements for heart view
        document.getElementById("toGalleryBtn").onclick = function() {
            document.getElementById("letter-box").style.display = "none";
            document.getElementById("gallery-screen").style.display = "block";
            
            // CRUCIAL: Makes card box highly transparent and shoves it to the very bottom 
            // of the screen, so the giant glowing text heart can take center stage!
            document.getElementById("mainCard").style.background = "rgba(11, 9, 20, 0.2)";
            document.getElementById("mainCard").style.border = "1px solid rgba(255, 117, 140, 0.1)";
            document.getElementById("mainCard").style.position = "absolute";
            document.getElementById("mainCard").style.bottom = "30px";
            
            isHeartRevealed = true; // Signals rendering loop to expand the heart shape
        };
    </script>
</body>
</html>
