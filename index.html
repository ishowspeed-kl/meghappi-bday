<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Secret Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; background: #06030b; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; overflow: hidden; position: relative; }
        
        /* --- REAL FLOWER GARDEN CONTAINER --- */
        .garden { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; pointer-events: none; }

        /* Flower Stem and Structure Base */
        .flower { position: absolute; bottom: -30px; transform-origin: bottom center; animation: realisticSway 6s ease-in-out infinite alternate; display: flex; flex-direction: column; align-items: center; }
        
        /* Real Stem Design */
        .stem { width: 8px; background: linear-gradient(to top, #114227, #1b7343); border-radius: 4px; animation: growStem 4s cubic-bezier(0.25, 1, 0.5, 1) forwards; box-shadow: inset -2px 0 5px rgba(0,0,0,0.4); }

        /* Exact Flower Head Graphics */
        .blooming-head { position: absolute; top: 0; transform: scale(0); transform-origin: center center; animation: bloomPerfect 2.5s 3.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; filter: drop-shadow(0 10px 25px rgba(255, 100, 130, 0.5)); }
        .blooming-head img { width: 100%; height: 100%; object-fit: contain; }

        /* Variety 1: Giant Red Rose */
        .flower-rose .stem { height: 340px; }
        .flower-rose .blooming-head { width: 150px; height: 150px; top: -75px; filter: drop-shadow(0 15px 30px rgba(255, 20, 60, 0.6)); }

        /* Variety 2: Elegant Pink Blossom */
        .flower-pink .stem { height: 260px; width: 7px; }
        .flower-pink .blooming-head { width: 120px; height: 120px; top: -60px; filter: drop-shadow(0 10px 25px rgba(255, 105, 180, 0.6)); }

        /* Variety 3: White Jasmine / Gardenia Accent */
        .flower-jasmine .stem { height: 200px; width: 6px; }
        .flower-jasmine .blooming-head { width: 100px; height: 100px; top: -50px; filter: drop-shadow(0 10px 25px rgba(255, 255, 255, 0.5)); }

        /* --- INTERACTIVE CONTAINER SYSTEM --- */
        .container-box { position: relative; z-index: 5; background: rgba(10, 6, 20, 0.93); backdrop-filter: blur(12px); border: 1px solid rgba(255, 117, 140, 0.25); padding: 35px; border-radius: 25px; box-shadow: 0 0 35px rgba(255, 117, 140, 0.25); text-align: center; max-width: 450px; width: 90%; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h2 { font-size: 1.6rem; margin-bottom: 20px; color: #ff758c; text-shadow: 0 0 15px rgba(255,117,140,0.6); font-family: monospace; letter-spacing: 2px; }
        input { padding: 14px; font-size: 1.3rem; border: 2px solid #ff758c; border-radius: 30px; text-align: center; margin-bottom: 20px; width: 260px; background: rgba(0,0,0,0.7); color: #ff9ebb; outline: none; font-family: monospace; }
        button { padding: 14px 35px; font-size: 1.1rem; background: linear-gradient(45deg, #ff758c, #ff7eb3); border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 20px rgba(255,117,140,0.4); transition: 0.3s; }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 30px rgba(255,117,140,0.8); }
        #error-msg { color: #ff4757; margin-top: 15px; font-weight: bold; font-family: monospace; }

        /* Envelope Step */
        #envelope-container { display: none; }
        .envelope { width: 260px; height: 160px; background: #ff758c; position: relative; border-radius: 0 0 10px 10px; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin: 20px auto; transition: 0.5s; }
        .envelope::before { content: ''; position: absolute; top: 0; left: 0; border-left: 130px solid transparent; border-right: 130px solid transparent; border-top: 90px solid #ff9ebb; transform-origin: top; transition: transform 0.5s; z-index: 3; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .envelope-text { position: absolute; width: 100%; bottom: 20px; text-align: center; font-weight: bold; color: white; font-size: 1.1rem; letter-spacing: 1px; }

        /* Letter setup */
        #letter-box { display: none; background: #ffffff; color: #1a1a24; text-align: left; }
        #letter-text { font-size: 1.1rem; line-height: 1.8; font-style: italic; min-height: 150px; font-weight: 500; }
        .next-btn { display: none; margin: 25px auto 0 auto; background: #ff758c; color: white; }

        /* Final Display Screen */
        #gallery-screen { display: none; }
        .gallery-title { font-size: 2rem; color: #ff758c; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255,117,140,0.6); }
        p { font-size: 1.05rem; color: #f0e6ef; line-height: 1.6; }

        /* --- ANIMATION PHYSICS KINETICS --- */
        @keyframes growStem { from { height: 0; } }
        @keyframes bloomPerfect { to { transform: scale(1); } }
        @keyframes realisticSway {
            0% { transform: rotate(-6deg) skewX(-2deg); }
            100% { transform: rotate(6deg) skewX(2deg); }
        }
    </style>
</head>
<body>

    <!-- REALISTIC HIGH-FIDELITY BLOWING FLOWER GARDEN -->
    <div class="garden" id="flowerGarden">
        
        <!-- Left Side: Real Red Rose -->
        <div class="flower flower-rose" style="left: -5%; animation-delay: 0s; animation-duration: 6.5s;">
            <div class="stem"></div>
            <div class="blooming-head">
                <img src="https://img.icons8.com/emoji/256/rose-emoji.png" alt="Rose">
            </div>
        </div>

        <!-- Left Center: Real Pink Blossom -->
        <div class="flower flower-pink" style="left: 15%; animation-delay: 0.5s; animation-duration: 5.2s;">
            <div class="stem"></div>
            <div class="blooming-head">
                <img src="https://img.icons8.com/emoji/256/cherry-blossom.png" alt="Pink Blossom">
            </div>
        </div>

        <!-- Center Background: Giant Authentic Red Rose -->
        <div class="flower flower-rose" style="left: 40%; animation-delay: 0.2s; animation-duration: 7s; transform: scale(1.25);">
            <div class="stem"></div>
            <div class="blooming-head">
                <img src="https://img.icons8.com/emoji/256/rose-emoji.png" alt="Rose">
            </div>
        </div>

        <!-- Right Center: Real Jasmine / White Flower -->
        <div class="flower flower-jasmine" style="left: 68%; animation-delay: 0.8s; animation-duration: 5.8s;">
            <div class="stem"></div>
            <div class="blooming-head">
                <img src="https://img.icons8.com/emoji/256/white-flower.png" alt="Jasmine">
            </div>
        </div>

        <!-- Far Right: Secondary Large Real Rose -->
        <div class="flower flower-rose" style="left: 85%; animation-delay: 0.4s; animation-duration: 4.8s;">
            <div class="stem"></div>
            <div class="blooming-head">
                <img src="https://img.icons8.com/emoji/256/rose-emoji.png" alt="Rose">
            </div>
        </div>

    </div>

    <!-- MAIN CARD BOX -->
    <div class="container-box" id="mainCard">
        
        <!-- 1. LOCK SCREEN -->
        <div id="lock-screen">
            <h2>🔒 ENTER ACCESS CODE</h2>
            <input type="text" id="password" pattern="[0-9]*" inputmode="numeric" placeholder="DDMMYYYY">
            <button id="unlockBtn">Unlock Garden</button>
            <div id="error-msg"></div>
        </div>

        <!-- 2. INTERACTIVE ENVELOPE -->
        <div id="envelope-container">
            <h2 style="margin-bottom: 10px;">Message Received! 💌</h2>
            <p style="color: #bfaec2; margin-bottom: 20px; font-size: 0.95rem;">Tap envelope to open</p>
            <div class="envelope" id="mainEnvelope">
                <div class="envelope-text">FOR MEGHAPPI ❤️</div>
            </div>
        </div>

        <!-- 3. TYPEWRITER LETTER -->
        <div id="letter-box">
            <div id="letter-text"></div>
            <button class="next-btn" id="toGalleryBtn">Click for Final Surprise ➔</button>
        </div>

        <!-- 4. FINAL SURPRISE SCREEN -->
        <div id="gallery-screen">
            <h1 class="gallery-title">Happy Birthday, MEGHAPPI kulikathavaleeeee! 🎉💖</h1>
            <p>A beautiful digital garden filled with exact, gorgeous blowing flowers grown completely out of code just for you. Have the most wonderful birthday love! ❤️🎂</p>
        </div>

    </div>

    <script>
        // --- INTERACTIVE SYSTEM CARD LOGIC ---
        const messageText = "Dearest Meghappi... \n\nHappy Birthday to the most amazing girl in the entire universe. 🎂✨ \n\nYou make every single day brighter just by being in it. Your laughter is my favorite sound, and your happiness means everything to me. Here's to celebrating you today, your beautiful heart, and making countless more gorgeous memories together. \n\nI love you! ❤️";
        
        let index = 0;
        function typeWriter() {
            if (index < messageText.length) {
                let char = messageText.charAt(index);
                document.getElementById("letter-text").innerHTML += char === "\n" ? "<br>" : char;
                index++;
                setTimeout(typeWriter, 45); 
            } else {
                document.getElementById("toGalleryBtn").style.display = "block";
            }
        }

        // 1. Password Verification
        document.getElementById("unlockBtn").onclick = function() {
            var val = document.getElementById("password").value.trim();
            if (val === "18012007") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("envelope-container").style.display = "block";
                
                // Immediately activate the realistic image-based blowing flower garden background
                document.getElementById("flowerGarden").style.display = "block";
            } else {
                document.getElementById("error-msg").innerText = "❌ Try again, love!";
            }
        };

        // 2. Envelope Triggers Letter Sequence
        document.getElementById("mainEnvelope").onclick = function() {
            this.classList.add("open");
            setTimeout(() => {
                document.getElementById("envelope-container").style.display = "none";
                document.getElementById("letter-box").style.display = "block";
                typeWriter();
            }, 800);
        };

        // 3. Move to final display screen
        document.getElementById("toGalleryBtn").onclick = function() {
            document.getElementById("letter-box").style.display = "none";
            document.getElementById("gallery-screen").style.display = "block";
            
            // Soften center transparency so the full high-def blooming flowers pop beautifully behind it
            document.getElementById("mainCard").style.background = "rgba(10, 6, 20, 0.4)";
            document.getElementById("mainCard").style.position = "absolute";
            document.getElementById("mainCard").style.top = "40px";
        };
    </script>
</body>
</html>
