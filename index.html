<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Secret Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { height: 100vh; background: #0b0914; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        #lock-screen { text-align: center; position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0b0914; z-index: 10; }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #ff758c; }
        input { padding: 14px; font-size: 1.3rem; border: 2px solid #ff758c; border-radius: 30px; text-align: center; margin-bottom: 20px; width: 260px; background: rgba(255,255,255,0.05); color: white; outline: none; }
        button { padding: 14px 35px; font-size: 1.1rem; background: linear-gradient(45deg, #ff758c, #ff7eb3); border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #content { display: none; text-align: center; max-width: 550px; padding: 40px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 3.5rem; background: linear-gradient(45deg, #ff758c, #ff7eb3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        p { font-size: 1.3rem; line-height: 1.7; color: #f0e6ef; }
        #error-msg { color: #ff4757; margin-top: 15px; font-weight: bold; }
        .heart { position: absolute; font-size: 2.5rem; pointer-events: none; animation: floatUp 4s linear infinite; bottom: -60px; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 100% { transform: translateY(-115vh) scale(1.2); opacity: 0; } }
    </style>
</head>
<body>
    <div id="lock-screen">
        <h2>🔒 ENTER ACCESS CODE</h2>
        <!-- Added explicit numeric triggers for phones -->
        <input type="text" id="password" pattern="[0-9]*" inputmode="numeric" placeholder="DDMMYYYY">
        <button id="unlockBtn">Unlock Surprise</button>
        <div id="error-msg"></div>
    </div>

    <div id="content">
        <h1>Happy Birthday, MEGHAPPI! 🎉</h1>
        <p>To the most incredible girl in the universe. You make every single day brighter just by being in it. Here is to you, your beautiful smile, and another amazing year ahead! ❤️</p>
    </div>

    <script>
        document.getElementById("unlockBtn").onclick = function() {
            var val = document.getElementById("password").value.trim();
            
            // This checks strictly for her birthday digits
            if (val === "18012007") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("content").style.display = "block";
                
                // Starts the heart animations instantly
                setInterval(function() {
                    var heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerHTML = ["❤️","💖","✨","💕"][Math.floor(Math.random() * 4)];
                    heart.style.left = (Math.random() * 100) + "vw";
                    document.body.appendChild(heart);
                    setTimeout(function() { heart.remove(); }, 4000);
                }, 200);
            } else {
                document.getElementById("error-msg").innerText = "❌ Try again, love!";
            }
        };
    </script>
</body>
</html>
